# font_family JetBrainsMono Nerd Font Mono
font_size 14
window_padding_width 18
confirm_os_window_close 0
scrollback_indicator_opacity 0
cursor_shape block
cursor_blink_interval 0
cursor_trail 3
shell zsh
# BEGIN_KITTY_THEME
# Matugen
include current-theme.conf
# END_KITTY_THEME


# BEGIN_KITTY_FONTS
font_family      family="Iosevka Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
